version: "3.9"

services:
  influxdb3:
    image: influxdb:3-core
    container_name: influxdb3
    ports:
      - "8181:8181"
    volumes:
      - influxdb3-data:/var/lib/influxdb3
    command:
      - influxdb3
      - serve
      - --node-id=host01
      - --object-store=file
      - --data-dir=/var/lib/influxdb3

  rabbitmq:
    image: rabbitmq:3.12.9-management
    restart: always
    ports:
      - "5672:5672"    # RabbitMQ broker
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    command: rabbitmq-server
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq
      - ./rabbitmq/log:/var/log/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - influxdb3


  producer:
    build:
      context: ..
      dockerfile: docs/Dockerfile
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy   # wait until rabbitmq is running
    environment:
      RABBITMQ_HOST: rabbitmq     # host = service name
    command: python src/app_producer.py


  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    ports:
      - "3000:3000"   
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    depends_on:
      - influxdb3
    volumes:
      - grafana-data:/var/lib/grafana


volumes:
  influxdb3-data:
  rabbitmq-data:
  rabbitmq-log:
  grafana-data:
