version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3.12.9-management
    restart: always
    ports:
      - "5672:5672"    # RabbitMQ broker
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    command: rabbitmq-server
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq
      - ./rabbitmq/log:/var/log/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  producer:
    build:
      context: ..
      dockerfile: docs/Dockerfile
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy   # wait until rabbitmq is running
    environment:
      RABBITMQ_HOST: rabbitmq     # host = service name
    command: python src/app_producer.py

volumes:
  rabbitmq-data:
  rabbitmq-log:
